<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeleton Screen - Démo simple</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
    }

    .skeleton-layout {
      max-width: 680px;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 16px;
    }

    .skeleton {
      border-radius: 4px;
      background: linear-gradient(90deg, #eceff3 25%, #f5f7fa 37%, #eceff3 63%);
      background-size: 400% 100%;
      animation: shimmer 1.25s infinite linear;
    }

    .image {
      width: 100%;
      aspect-ratio: 4 / 3;
    }

    .text {
      display: grid;
      align-content: center;
      gap: 10px;
    }

    .line {
      height: 14px;
      width: 100%;
    }

    .line.short {
      width: 62%;
    }

    @keyframes shimmer {
      0% {
        background-position: 100% 0;
      }
      100% {
        background-position: -100% 0;
      }
    }
  </style>
</head>
<body>
  <div id="content" class="skeleton-layout" aria-label="Chargement en cours">
    <div class="skeleton image"></div>

    <div class="text">
      <div class="skeleton line"></div>
      <div class="skeleton line"></div>
      <div class="skeleton line short"></div>
    </div>
  </div>

</html>
